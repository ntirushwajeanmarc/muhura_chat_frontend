server {
  listen 80;
  client_max_body_size 10M;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to backend
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_buffering off;
  }

  # Legacy /uploads paths — files are served via /api/files
  location /uploads/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_buffering off;
  }

  # Proxy Socket.IO
  location /socket.io/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
  }

  # PWA service worker and manifest — always revalidate
  location ~* ^/(sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  # index.html must not be cached so browsers detect new builds
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  # React SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
